<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBI: Northern Borno Focused Analysis v10</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <script>
        // Initialize map focused on the North border
        const map = L.map('map').setView([13.15, 13.7], 9);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const primaryGroup = L.layerGroup().addTo(map);
        const secondaryGroup = L.layerGroup().addTo(map);
        const heatGroup = L.layerGroup().addTo(map);
        const roadsGroup = L.layerGroup().addTo(map);

        // 1. Schools (Filtered to Northern Tip)
        fetch('schools_northern_tip.geojson')
            .then(res => res.json())
            .then(data => {
                const layer = L.geoJSON(data, {
                    filter: f => ['Primary', 'Pre Primary', 'Secondary'].includes(f.properties.category),
                    onEachFeature: (f, l) => {
                        l.bindPopup(`<strong>${f.properties.name}</strong><br>Type: ${f.properties.category}`);
                        if (f.properties.category === 'Secondary') secondaryGroup.addLayer(l);
                        else primaryGroup.addLayer(l);
                    },
                    pointToLayer: (f, latlng) => {
                        const color = (f.properties.category === 'Secondary') ? "#ff7800" : "#228b22";
                        return L.circleMarker(latlng, { radius: 6, fillColor: color, color: "#000", weight: 1, fillOpacity: 0.9 });
                    }
                });
                // Auto-fit to the small area
                map.fitBounds(layer.getBounds(), { padding: [50, 50] });
            });

        // 2. Road Network (Northern Tip)
        fetch('roads_northern_tip.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#555", weight: 1.5, opacity: 0.7 }
                }).addTo(roadsGroup);
            });

        // 3. Population Heatmap (Northern Tip)
        fetch('populated_places_northern_tip.geojson')
            .then(res => res.json())
            .then(data => {
                const heatPoints = data.features.map(f => [f.geometry.coordinates[1], f.geometry.coordinates[0], 0.5]);
                L.heatLayer(heatPoints, { radius: 30, blur: 20, minOpacity: 0.4, gradient: {0.4:'#abd9e9', 0.7:'#fee090', 1.0:'#f46d43'} }).addTo(heatGroup);
            });

        L.control.layers(null, {
            "Primary Schools": primaryGroup,
            "Secondary Schools": secondaryGroup,
            "Road Network": roadsGroup,
            "Population Density": heatGroup
        }, { collapsed: false }).addTo(map);

    </script>
</body>
</html>
