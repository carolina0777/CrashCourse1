<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Nigeria Schools & Population Map v6</title>
    
    <!-- 1. Include Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; font-family: sans-serif; }
        .legend {
            padding: 6px 8px;
            font: 14px Arial, Helvetica, sans-serif;
            background: white;
            background: rgba(255,255,255,0.8);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px;
            line-height: 24px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- 2. Include Leaflet and Heatmap Plugin -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <script>
        // 3. Initialize the map with strict boundaries
        const latMin = 10.0, latMax = 13.5;
        const lonMin = 11.0, lonMax = 14.5;
        const areaBounds = L.latLngBounds([latMin, lonMin], [latMax, lonMax]);

        const map = L.map('map', {
            minZoom: 8,
            maxZoom: 18,
            maxBounds: areaBounds,
            maxBoundsViscosity: 1.0
        }).setView([11.83, 12.75], 8);

        // 4. Background Tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 5. Initialize Layer Groups
        const primaryGroup = L.layerGroup().addTo(map);
        const secondaryGroup = L.layerGroup().addTo(map);
        const heatGroup = L.layerGroup().addTo(map);

        // 6. Load Schools Data
        fetch('schools_filtered.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    filter: (feature) => {
                        const cat = feature.properties.category;
                        return (cat === "Primary" || cat === "Pre Primary" || cat === "Secondary");
                    },
                    onEachFeature: (feature, layer) => {
                        const name = feature.properties.name || "Unknown School";
                        const cat = feature.properties.category || "N/A";
                        layer.bindPopup(`<strong>${name}</strong><br>Type: ${cat}`);
                        
                        if (cat === "Primary" || cat === "Pre Primary") primaryGroup.addLayer(layer);
                        else if (cat === "Secondary") secondaryGroup.addLayer(layer);
                    },
                    pointToLayer: (feature, latlng) => {
                        const cat = feature.properties.category;
                        const color = (cat === "Secondary") ? "#ff7800" : "#228b22";
                        return L.circleMarker(latlng, {
                            radius: 4, fillColor: color, color: "#000", weight: 1, opacity: 1, fillOpacity: 0.8
                        });
                    }
                }).addTo(map);
            });

        // 7. Load Populated Places and create Heatmap
        fetch('populated_places_filtered.geojson')
            .then(response => response.json())
            .then(data => {
                const heatPoints = data.features.map(feature => {
                    return [feature.geometry.coordinates[1], feature.geometry.coordinates[0], 0.5]; // Balanced intensity
                });

                const heat = L.heatLayer(heatPoints, {
                    radius: 25,
                    blur: 25,
                    minOpacity: 0.4,
                    gradient: {
                        0.4: '#abd9e9', // Sky blue
                        0.7: '#fee090', // Sunset yellow
                        1.0: '#f46d43'  // Soft coral orange
                    }
                }).addTo(heatGroup);
            });

        // 8. Layer Controls
        const overlays = {
            "<span style='color: #d32f2f; font-weight: bold;'>Settlement Density (Heatmap)</span>": heatGroup,
            "Primary Schools": primaryGroup,
            "Secondary Schools": secondaryGroup
        };
        L.control.layers(null, overlays, { collapsed: false }).addTo(map);

        map.fitBounds(areaBounds);
    </script>
</body>
</html>
