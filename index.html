<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Nigeria Schools Map v3</title>
    
    <!-- 1. Include Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* 2. Set the size of the map container */
        #map {
            height: 100vh; /* full height of the screen */
            width: 100%;
        }
        body { margin: 0; padding: 0; font-family: sans-serif; }
    </style>
</head>
<body>

    <!-- 3. The div where the map will appear -->
    <div id="map"></div>

    <!-- 4. Include Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 5. Initialize the map with strict boundaries
        const latMin = 10.0, latMax = 13.5;
        const lonMin = 11.0, lonMax = 14.5;
        const areaBounds = L.latLngBounds([latMin, lonMin], [latMax, lonMax]);

        const map = L.map('map', {
            minZoom: 8,            // Higher number = more zoomed in
            maxZoom: 18,
            maxBounds: areaBounds, // Set the area you can't leave
            maxBoundsViscosity: 1.0 // 1.0 means "hard edge" - no dragging past the line
        }).setView([11.83, 12.75], 8);

        // 6. Add a background (Tile Layer)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 7. Initialize Layer Groups (containers for our filters)
        const primaryGroup = L.layerGroup().addTo(map);
        const secondaryGroup = L.layerGroup().addTo(map);

        // 8. Load your filtered GeoJSON data
        fetch('schools_filtered.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    // Filter: Only allow Primary and Secondary to be processed
                    filter: function(feature) {
                        const cat = feature.properties.category;
                        return (cat === "Primary" || cat === "Pre Primary" || cat === "Secondary");
                    },
                    onEachFeature: function (feature, layer) {
                        const name = feature.properties.name || "Unknown School";
                        const cat = feature.properties.category || "N/A";
                        const lga = feature.properties.lganame || "N/A";
                        const state = feature.properties.statename || "N/A";
                        
                        layer.bindPopup(`
                            <div style="font-size: 14px;">
                                <strong>${name}</strong><br>
                                <hr>
                                <b>Type:</b> ${cat}<br>
                                <b>LGA:</b> ${lga}<br>
                                <b>State:</b> ${state}
                            </div>
                        `);

                        // Add to correct group
                        if (cat === "Primary" || cat === "Pre Primary") {
                            primaryGroup.addLayer(layer);
                        } else if (cat === "Secondary") {
                            secondaryGroup.addLayer(layer);
                        }
                    },
                    pointToLayer: function (feature, latlng) {
                        const cat = feature.properties.category;
                        let color = "#228b22"; // Green for Primary
                        if (cat === "Secondary") color = "#ff7800"; // Orange for Secondary

                        return L.circleMarker(latlng, {
                            radius: 4,
                            fillColor: color,
                            color: "#000",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        });
                    }
                });

                // 9. Add the Filter Control
                const overlays = {
                    "Primary Schools": primaryGroup,
                    "Secondary Schools": secondaryGroup
                };
                L.control.layers(null, overlays, { collapsed: false }).addTo(map);

                // 10. Automatically zoom to fit the area
                map.fitBounds(areaBounds);
            })
            .catch(error => {
                console.error('Error loading the schools data:', error);
                alert('Could not load schools_filtered.geojson. Make sure the file exists in the public/ folder.');
            });
    </script>
</body>
</html>
