<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Data Dashboard</title>
    <!-- Chart.js for drawing the charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for reading CSV files easily -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .card { 
            background: white; 
            border-radius: 8px; 
            padding: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            min-height: 350px;
        }
        .card h2 { margin-top: 0; font-size: 1.2rem; color: #333; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        canvas { width: 100% !important; height: 300px !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Global Flood Archive Dashboard</h1>
        <p>Visualizing data from the cleaned flood archive</p>
    </div>

    <div class="dashboard-grid">
        <!-- Card 1: Top 20 Countries -->
        <div class="card">
            <h2>(1) Top 20 Countries by Flood Events</h2>
            <canvas id="chart1"></canvas>
        </div>

        <!-- Card 2: Events per Year -->
        <div class="card">
            <h2>(2) Flood Events per Year</h2>
            <canvas id="chart2"></canvas>
        </div>

        <!-- Card 3: Events by Category -->
        <div class="card">
            <h2>(3) Events by Cause Category</h2>
            <canvas id="chart3"></canvas>
        </div>

        <!-- Card 4: Displaced by Severity -->
        <div class="card">
            <h2>(4) Total Displaced by Severity</h2>
            <canvas id="chart4"></canvas>
        </div>
    </div>

    <script>
        // 1. Load the data using PapaParse
        Papa.parse('./floodarchive_cleaned.csv', {
            download: true,
            header: true,
            dynamicTyping: true,
            complete: function(results) {
                const data = results.data.filter(row => row.ID); // Filter out empty rows
                createCharts(data);
            }
        });

        function createCharts(data) {
            // --- DATA PROCESSING FOR CHART 1 (Countries) ---
            const countryCounts = {};
            data.forEach(row => {
                const c = row.Country || 'Unknown';
                countryCounts[c] = (countryCounts[c] || 0) + 1;
            });
            const topCountries = Object.entries(countryCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 20);

            new Chart(document.getElementById('chart1'), {
                type: 'bar',
                data: {
                    labels: topCountries.map(x => x[0]),
                    datasets: [{
                        label: 'Number of Events',
                        data: topCountries.map(x => x[1]),
                        backgroundColor: '#3498db'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // --- DATA PROCESSING FOR CHART 2 (Years) ---
            const yearCounts = {};
            data.forEach(row => {
                if (row.Year) yearCounts[row.Year] = (yearCounts[row.Year] || 0) + 1;
            });
            const sortedYears = Object.keys(yearCounts).sort();

            new Chart(document.getElementById('chart2'), {
                type: 'line',
                data: {
                    labels: sortedYears,
                    datasets: [{
                        label: 'Events per Year',
                        data: sortedYears.map(y => yearCounts[y]),
                        borderColor: '#e67e22',
                        fill: false,
                        tension: 0.1
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // --- DATA PROCESSING FOR CHART 3 (Cause) ---
            const causeCounts = {};
            data.forEach(row => {
                const cause = row.MainCause || 'Other';
                causeCounts[cause] = (causeCounts[cause] || 0) + 1;
            });
            const topCauses = Object.entries(causeCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            new Chart(document.getElementById('chart3'), {
                type: 'bar',
                data: {
                    labels: topCauses.map(x => x[0]),
                    datasets: [{
                        label: 'Events',
                        data: topCauses.map(x => x[1]),
                        backgroundColor: '#2ecc71'
                    }]
                },
                options: { 
                    indexAxis: 'y', // Makes it a horizontal bar chart
                    responsive: true, 
                    maintainAspectRatio: false 
                }
            });

            // --- DATA PROCESSING FOR CHART 4 (Displaced by Severity) ---
            const displacedBySeverity = {};
            data.forEach(row => {
                const sev = row.Severity || 0;
                displacedBySeverity[sev] = (displacedBySeverity[sev] || 0) + (row.Displaced || 0);
            });
            const sortedSeverities = Object.keys(displacedBySeverity).sort();

            new Chart(document.getElementById('chart4'), {
                type: 'bar',
                data: {
                    labels: sortedSeverities,
                    datasets: [{
                        label: 'Total Displaced People',
                        data: sortedSeverities.map(s => displacedBySeverity[s]),
                        backgroundColor: '#9b59b6'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
